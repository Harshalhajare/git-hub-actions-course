name: 18-1-reusable workflows

on: 
    workflow_call:
        inputs:
            target-dir: 
                type: string
                required: true
        outputs:
            build-status:
                description: 'The status of the build'
                value: ${{ jobs.deploy.outputs.build-status }}
            url:
                description: 'The URL of the deployed application'
                value: ${{ jobs.deploy.outputs.url }}


jobs:
    deploy:
        runs-on: ubuntu-latest
        outputs:
            build-status: ${{jobs.build.outputs.build-status}}
            url: ${{jobs.deploy.outputs.url}}
        steps:
            - name: checkout repo
              uses: actions/checkout@v4
            - name: Build
              id: build
              run: |
                echo 'building using dir ${{inputs.target-dir}}'
                echo 'build-status= success' >> $GITHUB_OUTPUT
            - name: Deploy
              id: deploy
              run: |
                echo 'deploying using repo'
                echo 'url= google.com' >> $GITHUB_OUTPUT
name: 09-using functions

on: 
    pull_request:
    workflow_dispatch:

jobs:
    echo:
        runs-on: ubuntu-latest
        steps:
            - name: Print PR title
              run: echo "${{github.event.pull_request.title}}"
            - name: Print PR lable
              run: |
                cat <<EOF
                ${{toJson(github.event.pull_request.labels)}}
                EOF
            - name: Bug fix Step
              if: ${{!cancelled}} && ${{contains(github.event.pull_request.title, 'fix')}}
              run: echo "This PR is for bug fix"
            - name : sleep for 20 secs
              run: sleep 20
            - name: failing step
              run: exit 1
            - name: i will be skipped
              if: ${{ success() }}
              run: echo "i will print if previous steps succeed"
            - name: i will execute
              if: ${{failure()}} 
              run: echo "i will print if previous steps fail"
            - name: I will execute
              if: ${{ !cancelled() }}              
              run: echo "i will print except when workflow cancelled"
            - name: i will execute when cancelled
              if: ${{ cancelled() }}              
              run: echo "i will print only when workflow cancelled"
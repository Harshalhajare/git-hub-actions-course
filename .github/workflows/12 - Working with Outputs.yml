name: 12 - Working with Outputs

on:
    workflow_dispatch:
        inputs:
            build-status:
                description: 'Status of the build'
                type: choice
                options:
                    - success
                    - failure
                default: success

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            b-status: ${{ steps.build.outputs.status }}
            output1: ${{ steps.build.outputs.output1 }}
            output2: ${{ steps.build.outputs.output2 }}
        steps:
            - name: print GITHUB_OUTPUT
              run: echo "GITHUB_OUTPUT is $GITHUB_OUTPUT"
            - name: Build
              id: build
              run: |
                echo "$GITHUB_OUTPUT"
                echo "status=${{ inputs.build-status }}" >> $GITHUB_OUTPUT
                echo "output1=value1" >> $GITHUB_OUTPUT
                echo "output2=value2" >> $GITHUB_OUTPUT
                cat "$GITHUB_OUTPUT"
            - name: Mistake step
              run: |
                echo "mistake=true" > $GITHUB_OUTPUT
                cat "$GITHUB_OUTPUT"

    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: needs.build.outputs.b-status == 'success'
        steps:
            - name: deploy
              run: |
               echo "Deploying application"
            - name: print outputs
              run: |                
                echo "Output 1: ${{ needs.build.outputs.output1 }}"
                echo "Output 2: ${{ needs.build.outputs.output2 }}"

               

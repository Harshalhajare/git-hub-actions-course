name: 12 - Working with Outputs

on:
    workflow_dispatch:
        inputs:
            build-status:
                description: 'Status of the build'
                type: choice
                options:
                    - success
                    - failure
                default: success

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            b-status: ${{ steps.build.outputs.status }}
        steps:
            - name: print GITHUB_OUTPUT
              run: echo "GITHUB_OUTPUT is $GITHUB_OUTPUT"
            - name: Build
              id: build
              run: echo "status=${{ inputs.build-status }}" >> $GITHUB_OUTPUT

    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: needs.build.outputs.b-status == 'success'
        steps:
            - name: deploy
              run: echo "Deploying application"
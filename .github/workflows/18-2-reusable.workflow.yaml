name: 18-2-reusable.workflow


on:
    workflow_dispatch:
        
jobs:
    deploy-called:
        uses: ./.github/workflows/18-1-reusable workflow.yaml
        with:
            target-dir: 'dummy-dir'
    print-outpts:
        runs-on: ubuntu-latest
        needs: deploy-called
        steps:
            - name: Print outputs
              run: |
                echo "Build Status: ${{ needs.deploy.outputs.build-status }}"
                echo "Deployed URL: ${{ needs.deploy.outputs.url }}"

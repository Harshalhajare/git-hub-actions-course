name: 19-concurrency

on:
    workflow_dispatch:

concurrency:
    group: ${{github.workflow}}-${{github.ref}}
    cancel-in-progress: true

jobs:
    ping:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Ping url
              id: ping-url
              with:
                url: https://httpbin.org/get
                max-retries: 20
                delay: 5
              run: echo "ping"
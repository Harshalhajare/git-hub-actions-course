name: 19-concurrency

on:
    workflow_dispatch:

concurrency:
    group: ${{github.workflow}}-${{github.ref}}

jobs:
    ping:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Ping url
              id: ping-url
              run: |
                    echo "Pinging url..."
                    sleep 50
                    echo "Done pinging url."
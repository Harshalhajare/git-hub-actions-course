name: 04- Using Actions

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 04-Using Actions/react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: current directory
        run: pwd
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install Dependencies
        run: npm ci
      - name: Run unit test
        run: npm run test



      
    

